name: Deployment

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: docker build -t arjunlatiwala/next-js-app .
      - echo "${{secrets.DOCKER_PASSWORD}}" | docker login ghcr.io -u ${{secrets.DOCKER_USERNAME}} --password-stdin
      - run: docker push arjunlatiwala/next-js-app:latest
